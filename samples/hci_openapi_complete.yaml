openapi: 3.0.1
info:
  title: hci
  description: "<div id=\"description-header\">\r\n    \"API de Externos utilizado para que otros productos externos a HCI\
    \ interactúen con HCI.\"\r\n    <span id=\"description-environment\">Entorno: <i>VAL</i></span>\r\n</div>\r\n\r\n<div\
    \ id=\"summary\">\r\n    <p>Para utilizar esta api debes solicitar un <code>api-key</code>  al correo <a href='mailto:hci@navarra.com'>hci@navarra.com</a>.</p>\r\
    \n    <details>\r\n        <summary>\r\n            Autenticación JWT y manejo de excepciones\r\n        </summary>\r\n\
    \        <p>\r\n\r\n            Para autenticar el cliente api, puedes utilizar el paguete nuget <code>GN.Sanidad.HCI.Common.ApiClient</code>,\r\
    \n            el cual implementa un handler para el manejo del token de autenticación. Para el manejo de excepciones el\
    \ handler encapsula\r\n            las respuestas en la clase <code> GN.Sanidad.HCI.Common.ClientHandler.Response.ApiResponseHandler&lt;T&gt;</code><br>\r\
    \n        </p>\r\n        <p>\r\n            <strong>Ejemplo declaración del handler</strong>\r\n\r\n            new HttpClient(\r\
    \n            new GN.Sanidad.HCI.Common.ApiClient.AuthenticationBearerHandler(new AuthenticationBearerHandlerParam\r\n\
    \            {\r\n            Apikey = \"[ApiKey]\",\r\n            EndPointGenerateToken = \"api/Authentication\",\r\n\
    \            BaseUrl = \"http://[host]/ApiAuthentication\"\r\n            }, false);\r\n\r\n            <strong>Ejemplo\
    \ de registro del Handler con Refit sin inyección de dependencias</strong>\r\n\r\n            var apiClient =  RestService.For<IApiAuthentication>\r\
    \n                (\r\n                new HttpClient(\r\n                new GN.Sanidad.HCI.Common.ApiClient.AuthenticationBearerHandler(new\
    \ AuthenticationBearerHandlerParam\r\n                {\r\n                Apikey = \"[ApiKey]\",\r\n                EndPointGenerateToken\
    \ = \"api/Authentication\",\r\n                BaseUrl = \"http://[host]/ApiAuthentication\"\r\n                }, false))\r\
    \n                {\r\n                BaseAddress = new Uri(\"http://[host]/ApiAuthentication\"),\r\n               \
    \ Timeout = TimeSpan.FromSeconds(90)\r\n                }));\r\n                var response = await apiClient.Authenticate(param);\r\
    \n\r\n\r\n                <strong>Ejemplo de registro del Handler con Refit con inyección de dependencias</strong>\r\n\
    \r\n\r\n                public void ConfigureServices(IServiceCollection services)\r\n                {\r\n          \
    \      services.AddRefitClient<IApiAuthentication>\r\n                    ()\r\n                    .ConfigureHttpClient(httpClient\
    \ => {\r\n                    httpClient.BaseAddress = new Uri(\"http://[host]/ApiAuthentication\");\r\n             \
    \       httpClient.Timeout = TimeSpan.FromSeconds(90);\r\n                    }))\r\n                    .AddHttpMessageHandler<GN.Sanidad.HCI.Common.ApiClient.AuthenticationBearerHandler>\r\
    \n                        (new AuthenticationBearerHandlerParam\r\n                        {\r\n                     \
    \   Apikey = \"[ApiKey]\",\r\n                        EndPointGenerateToken = \"api/Authentication\",\r\n            \
    \            BaseUrl = \"http://[host]/ApiAuthentication\"\r\n                        }, true);\r\n                  \
    \      }\r\n                        <strong>Ejemplo del cliente con Refit</strong>\r\n\r\n                        public\
    \ interface IApiAuthentication\r\n                        {\r\n\r\n                        [Headers(\"API-Version: 1\"\
    )]\r\n                        [Post(\"/api/Authentication/Authenticate\")]\r\n                        Task<ApiResponseHandler<AuthenticateDto>>\
    \ Authenticate([Body] AuthenticateRequest param);\r\n        }\r\n\r\n    </details>\r\n</div>"
  contact:
    name: Gobierno de Navarra
    url: http://portalempleado.admon-cfnavarra.es
    email: navarra@navarra.es
  version: v1
servers:
- url: /rest/hci/v1
paths:
  /api/Authentication:
    post:
      tags:
      - PlataformaGenomica
      summary: Servicio Autenticación mock
      description: Servicio Autenticación mock
      parameters: []
      requestBody: {}
      responses:
        '200':
          description: Se se realiza la petición correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  tokenExpiredTime:
                    type: string
              examples:
                responseOK:
                  value:
                    accessToken: OK
                    tokenExpiredTime: '2024-06-10T15:30:00Z'
